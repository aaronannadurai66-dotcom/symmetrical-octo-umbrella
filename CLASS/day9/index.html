<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        li{
            background-color: lightgray;
        
            color: blueviolet;
            padding: 10px;
            
        }

        ul{
            display: flex;
            gap: 16px;
            list-style-type: none;
            align-items: center;
            justify-content: center;
            justify-content: space-between;
        }
        .nav{
           
            padding: 10px;
        }
        .cards{
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }
        .card{
            width: 150px;
            height: 100px;
            background-color: lightgreen;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid black;
        }
        



        


    </style>
       </head>
<body>
    <nav class="nav">
        <ul>
            <li>home</li>
            <li>about</li>
            <li>services</li>   
            <li>contact</li>
        </ul>
    </nav>
    
    <section class="cards">
        <div class="card">card 1</div>
        <div class="card">card 2</div>  
        <div class="card">card 3</div>
    </section>
    

        
    
</body>
</html>




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            border: 1px salmon;
            gap: 30px;
        }
        .inner{
           background-color: lightsteelblue;
        }
        .toolbar{
            display: flex;
            
        }
        .spacer{
            margin: auto;
        }
        
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">
            <p>This is inner div</p>
        </div>  
    </div>



    <div class="toolbar">
        <button>back</button>
        <div class="spacer"></div>
        <button>save</button>
        <button>refresh</button>
    </div>
    
</body>
</html>
