<!DOCTYPE html>
<html>
<head>
  <title>CSS Background and Text Color</title>
  <style>
    body {
      background-color: #f0f8ff;   /* background color */
     color: #ff8c00;      /* text color */
      font-family: Arial, sans-serif;
    }

    h2 {
      color: #0066cc;
    }

    ol {
      background-color: #ffffff;
      padding: 20px;
      width: 200px;
    }

    li {
      color: #444444;
    }
  </style>
</head>
<body>

  <h2>Ordered List</h2>

  <ol>
    <li>Wake up early</li>
    <li>Exercise</li>
    <li>Have breakfast</li>
    <li>Go to work</li>
    <li>Read a book</li>
  </ol>

</body>
</html>
