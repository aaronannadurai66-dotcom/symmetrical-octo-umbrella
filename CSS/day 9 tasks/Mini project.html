<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Flex Tasks</title>

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}
section {
    padding: 30px;
}


.header {
    display: flex;
    align-items: center;
    padding: 20px;
    background: #e6f4ff;
}

.header .logo {
    font-size: 24px;
    font-weight: bold;
}

.header nav {
    margin: 0 auto;
    display: flex;
    gap: 30px;
}

.header nav a {
    text-decoration: none;
    color: #333;
}

.header .cta {
    margin-left: auto;
}

.header .cta button {
    padding: 10px 20px;
}


.pricing {
    display: flex;
    gap: 20px;
}
.card {
    flex: 1;
    background: #fff1cc;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}
.card button {
    padding: 10px 20px;
    margin-top: 15px;
}


@media (max-width: 700px) {
    .pricing {
        flex-direction: column;
    }
}

.chat {
    height: 300px;
    border: 1px solid #ddd;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    display: flex;
    flex-direction: column-reverse;
    overflow-y: auto;
    padding: 10px;
    gap: 10px;
}

.message {
    padding: 10px;
    background: #d2ffd2;
    width: fit-content;
    border-radius: 8px;
}

.chat-input {
    padding: 10px;
    background: #f2f2f2;
}


.toolbar {
    display: flex;
    background: #ffe0e0;
    padding: 15px;
    gap: 20px;
}

.filters {
    /* left by default */
}

.search {
    margin: 0 auto; /* center */
}

.actions {
    margin-left: auto; /* right */
}
.actions button {
    margin-left: 10px;
}

.photo-strip {
    display: flex;
    gap: 10px;
    align-items: center;       /* vertically center images */
}
.photo-strip img {
    height: 120px;
    object-fit: cover;         /* maintain aspect ratio */
    border-radius: 8px;
}

@media (max-width: 600px) {
    .photo-strip {
        flex-direction: column;
    }
}


</style>
</head>
<body>


<section class="header">
    <div class="logo">MyLogo</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Pricing</a>
        <a href="#">Contact</a>
    </nav>

    <div class="cta">
        <button>Sign Up</button>
    </div>
</section>

<section>
    <h2>Pricing</h2>
    <div class="pricing">
        <div class="card">
            <h3>Basic</h3>
            <p>Rs.2000/month</p>
            <button>Choose</button>
        </div>
        <div class="card">
            <h3>Standard</h3>
            <p>Rs.3000/month</p>
            <button>Choose</button>
        </div>
        <div class="card">
            <h3>Premium</h3>
            <p>Rs.6000/month</p>
            <button>Choose</button>
        </div>
    </div>
</section>

<section>
    <h2>Chat</h2>
    <div class="chat">
        <div class="messages">
            <div class="message">Hello!</div>
            <div class="message">Welcome!</div>
            <div class="message">How can I help you?</div>
        </div>
        <div class="chat-input">
            <input type="text" placeholder="Type a message..." style="width:100%; padding:10px;">
        </div>
    </div>
</section>


<section>
    <h2>Dashboard Toolbar</h2>
    <div class="toolbar">
        <div class="filters">Filters</div>
        <div class="search">Search</div>
        <div class="actions">
          
        </div>
    </div>
</section>


<section>
    <h2>Photo Strip</h2>
    <div class="photo-strip">
        <img src="https://picsum.photos/300/200?1">
        <img src="https://picsum.photos/300/200?2">
        <img src="https://picsum.photos/300/200?3">
        <img src="https://picsum.photos/300/200?4">
    </div>
</section>

</body>
</html>
